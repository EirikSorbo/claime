<!DOCTYPE html>
<html lang="{{ site.lang | default: 'nb' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #1a1a2e;
      --ink2:    #252540;
      --surface: #f4f1ec;
      --paper:   #faf8f4;
      --edge:    #e2ddd6;
      --accent:  #3d5a99;
      --accent2: #6b8cce;
      --muted:   #8a8a9a;
      --muted2:  #b0aaaa;
      --r:       14px;
      --rs:      9px;
    }

    body {
      font-family: 'Geist Mono', monospace;
      background: var(--paper);  /* was --surface */
      color: var(--ink);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px 12px;
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      font-size: 18px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
    }

    /* NAV */
    .tab-bar {
      display: flex;
      justify-content: center;
      background: var(--paper);
      position: sticky;
      top: 49px;
      z-index: 99;
      border-bottom: 1px solid var(--edge);
    }

    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      padding: 11px 18px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Geist Mono', monospace;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-block;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); }

    /* INNHOLD */
    .page-wrap {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    .content-card {
      background: var(--paper);
      border: 1px solid var(--edge);
      border-radius: var(--r);
      padding: 32px 28px;
    }

    /* MARKDOWN-STYLING */
    .content-card h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.04em;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--edge);
    }

    .content-card h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 28px 0 12px;
    }

    .content-card h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink2);
      margin: 20px 0 8px;
    }

    .content-card p {
      font-size: 13px;
      line-height: 1.85;
      color: var(--ink2);
      margin-bottom: 14px;
    }

    .content-card ul, .content-card ol {
      font-size: 13px;
      line-height: 1.85;
      color: var(--ink2);
      margin: 0 0 14px 20px;
    }

    .content-card li { margin-bottom: 4px; }

    .content-card a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--edge);
      transition: border-color 0.15s;
    }

    .content-card a:hover { border-color: var(--accent); }

    .content-card strong { font-weight: 600; color: var(--ink); }

    .content-card em { font-style: italic; color: var(--muted); }

    .content-card code {
      background: var(--surface);
      border: 1px solid var(--edge);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12px;
    }

    .content-card blockquote {
      border-left: 3px solid var(--edge);
      padding-left: 16px;
      color: var(--muted);
      font-style: italic;
      margin: 16px 0;
    }

    .content-card hr {
      border: none;
      border-top: 1px solid var(--edge);
      margin: 24px 0;
    }

    .content-card table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 16px;
    }

    .content-card th {
      text-align: left;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted2);
      padding: 8px 10px;
      border-bottom: 1px solid var(--edge);
    }

    .content-card td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--edge);
      color: var(--ink2);
    }

    /* FOOTER */
    .app-footer {
      text-align: center;
      padding: 20px;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--muted2);
      border-top: 1px solid var(--edge);
      margin-top: auto;
    }

    @media (max-width: 480px) {
      .content-card { padding: 20px 16px; }
    }
    
    /* TIMELINE */
    .tl-wrap {
      position: relative;
      padding-left: 28px;
      border-left: 2px solid var(--edge);
      margin: 8px 0 0 0;
    }
    
    .tl-item {
      position: relative;
      margin-bottom: 24px;
    }
    
    .tl-item:last-child { margin-bottom: 0; }
    
    .tl-item::before {
      content: '';
      position: absolute;
      left: -35px;
      top: 5px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--paper);
      border: 2px solid var(--accent);
    }
    
    .tl-item.individual::before { border-color: #c45a5a; }
    
    .tl-date {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 3px;
    }
    
    .tl-time {
      display: block;
      font-size: 11px;
      color: var(--ink);
      margin-bottom: 5px;
    }
    
    .tl-title {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 4px;
    }
    
    .tl-item.individual .tl-title { color: #c45a5a; }
    
    .tl-desc {
      display: block;
      font-size: 12px;
      line-height: 1.75;
      color: var(--muted);
    }
    
    .tl-legend {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
    }
    
    .tl-leg {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }
    
    .tl-leg-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid;
      background: var(--paper);
    }
  </style>
</head>
<body>

  <header class="app-header">
    <a class="header-logo" href="{{ site.baseurl }}/">{{ site.title }}</a>
  </header>

  <nav class="tab-bar">
    {% for item in site.nav %}
      <a class="tab-btn {% if page.url == item.url %}active{% endif %}"
         href="{{ site.baseurl }}{{ item.url }}">{{ item.label }}</a>
    {% endfor %}
  </nav>

  <main class="page-wrap">
    <div class="content-card">
      {{ content }}
    </div>
  </main>

  <footer class="app-footer">
    {{ site.title }} — {{ site.description }}
  </footer>

</body>
</html>
